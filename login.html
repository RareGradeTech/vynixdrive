<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VynixRide — Driver Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0F172A;
  --bg: #0A0F1A;
  --border: rgba(255, 255, 255, 0.1);
  --blue: #1A3BFF;
  --blue-hover: #0d2ee6;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:'Outfit',sans-serif; background:var(--bg); color:#fff; }

/* ── INIT LOADER ── */
.init-loader { position:fixed; inset:0; background:var(--bg); z-index:10001; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .5s cubic-bezier(0.4, 0, 0.2, 1); }
.init-loader.hide { opacity:0; pointer-events:none; }
.loader-spinner { width:44px; height:44px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--blue); border-radius:50%; animation:sp .8s linear infinite; margin-bottom:20px; }
@keyframes sp { to { transform:rotate(360deg); } }

/* ═══ AUTH UI ═══ */
.auth-wrapper { position:fixed; inset:0; z-index:998; display:flex; flex-direction:column; font-family:'Outfit',sans-serif; overflow:hidden; }

/* Premium Driver POV Background */
.auth-bg { 
  position:absolute; inset:0; 
  background:url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?q=80&w=2070&auto=format&fit=crop') center center/cover no-repeat; 
  transform:scale(1.05); 
  animation:auth-zoom 20s ease-in-out infinite alternate; 
}
@keyframes auth-zoom { from{transform:scale(1.05)} to{transform:scale(1.15)} }

/* Deep Gradient Scrim */
.auth-scrim { 
  position:absolute; inset:0; 
  background:linear-gradient(to bottom, rgba(10,15,26,0.3) 0%, rgba(10,15,26,0.1) 30%, rgba(10,15,26,0.6) 60%, rgba(10,15,26,0.95) 100%); 
}

/* Top Bar Branding */
.auth-topbar { 
  position:relative; z-index:2; display:flex; align-items:center; gap:14px; 
  padding:56px 28px 0; 
  animation: fadeDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.auth-logo-dot { 
  width:46px; height:46px; background:#fff; border-radius:14px; 
  display:flex; align-items:center; justify-content:center; 
  font-weight:900; font-size:16px; color:var(--blue); flex-shrink:0; 
  box-shadow:0 8px 24px rgba(0,0,0,0.3); 
}
.auth-logo-name { font-size:24px; font-weight:900; color:#fff; letter-spacing:-0.5px; text-shadow:0 2px 12px rgba(0,0,0,.5); }

.auth-spacer { flex:1; position:relative; z-index:2; }

/* Modern Glassmorphism Bottom Sheet */
.auth-bottom { 
  position:relative; z-index:2; width: 100%;
  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  border-radius: 36px 36px 0 0;
  padding: 40px 28px calc(48px + env(safe-area-inset-bottom,0px)); 
  box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
  transform: translateY(100%);
  opacity: 0;
  animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
}

@keyframes slideUp { 
  to { transform: translateY(0); opacity: 1; } 
}
@keyframes fadeDown { 
  from { transform: translateY(-20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; } 
}

.auth-headline { 
  font-size:clamp(36px, 9vw, 52px); font-weight:900; color:#fff; 
  line-height:1.05; letter-spacing:-1.5px; margin-bottom:14px; 
}
.auth-subline { 
  font-size:16px; color:rgba(255,255,255,.7); font-weight:400; 
  margin-bottom:36px; line-height:1.6; max-width:340px; 
}

.auth-feats { display:flex; gap:16px; margin-bottom:32px; flex-wrap: wrap; }
.auth-feat-chip { 
  display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; 
  color:rgba(255,255,255,.9); background:rgba(255,255,255,.08); 
  border:1px solid rgba(255,255,255,.12); padding:8px 16px; border-radius:100px; 
}
.auth-feat-dot { width:6px; height:6px; border-radius:50%; background:#10B981; flex-shrink:0; box-shadow: 0 0 8px rgba(16, 185, 129, 0.6); }

.auth-pills { display:flex; flex-direction:column; gap:14px; margin-bottom:24px; }

/* Primary Action Button */
.pill-login { 
  width:100%; padding:18px 28px; border-radius:100px; border:none; 
  background:#fff; color:#000; font-family:'Outfit',sans-serif; 
  font-size:17px; font-weight:800; cursor:pointer; letter-spacing:-.2px; 
  box-shadow:0 8px 32px rgba(255,255,255,.15); 
  transition:transform .2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow .2s; 
  display:flex; align-items:center; justify-content:center; gap:12px; 
}
.pill-login:active { transform:scale(.96); box-shadow:0 4px 16px rgba(255,255,255,.1); }
.pill-g-icon { width:22px; height:22px; flex-shrink:0; }

/* Secondary Action */
.auth-demo-link { 
  display:block; width:100%; text-align:center; background:none; border:none; 
  padding:12px; font-family:'Outfit',sans-serif; font-size:14px; 
  color:rgba(255,255,255,.5); font-weight:600; cursor:pointer; transition:color .2s; 
}
.auth-demo-link:hover { color:rgba(255,255,255,.9); }

.auth-trust-bar { 
  display:flex; align-items:center; justify-content:center; gap:8px; 
  margin-top:16px; font-size:12px; font-weight:600; color:rgba(255,255,255,.3); 
}

/* ── TOAST ── */
.toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(15px); background:#fff; color:#000; padding:14px 28px; border-radius:100px; font-size:14px; font-weight:800; opacity:0; pointer-events:none; transition:.3s cubic-bezier(0.16, 1, 0.3, 1); z-index:1000; white-space:nowrap; max-width:90vw; overflow:hidden; text-overflow:ellipsis; box-shadow:0 10px 40px rgba(0,0,0,.3); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(min-width:900px){ 
  .auth-bottom { max-width:480px; margin:0 auto 40px auto; border-radius: 36px; border: 1px solid var(--border); } 
}
</style>
</head>
<body>

<div class="init-loader" id="initLoader">
  <div class="loader-spinner"></div>
  <div style="font-family:'Outfit',sans-serif; font-weight:900; color:#fff; font-size:22px; letter-spacing:-0.5px;">VynixRide</div>
</div>

<div class="auth-wrapper" id="authWrapper" style="opacity:0; transition: opacity 0.5s;">
  <div class="auth-bg"></div>
  <div class="auth-scrim"></div>
  
  <div class="auth-topbar">
    <div class="auth-logo-dot">VX</div>
    <div class="auth-logo-name">VynixRide <span style="font-size:15px;font-weight:600;opacity:.7;margin-left:6px;">Driver</span></div>
  </div>
  
  <div class="auth-spacer"></div>
  
  <div class="auth-bottom">
    <div class="auth-feats">
      <div class="auth-feat-chip"><div class="auth-feat-dot"></div>Earn Daily</div>
      <div class="auth-feat-chip"><div class="auth-feat-dot"></div>Flexible Hours</div>
    </div>
    
    <div class="auth-headline">Drive & earn,<br>on your terms.</div>
    <div class="auth-subline">Sign in to access your driver dashboard, manage live requests, and track your earnings.</div>
    
    <div class="auth-pills">
      <button class="pill-login" id="btnGoogleSignIn">
        <svg class="pill-g-icon" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/>
          <path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.4 19.2 14 24 14c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 16.2 4 9.5 8.4 6.3 14.7z"/>
          <path fill="#FBBC05" d="M24 44c5.3 0 10.1-1.8 13.8-4.8l-6.4-5.4C29.5 35.5 26.9 36 24 36c-5.9 0-10.5-3.9-11.9-9.1l-7 5.4C8.4 39.6 15.6 44 24 44z"/>
          <path fill="#EA4335" d="M44.5 20H24v8.5h11.9c-.6 3-2.5 5.5-5.1 7.3l6.4 5.4C41.9 37.5 44.5 31.2 44.5 24c0-1.3-.2-2.7-.2-4z"/>
        </svg>
        Continue with Google
      </button>
    </div>
    
    <button class="auth-demo-link" id="skipAuth">Skip to Demo Dashboard →</button>
    
    <div class="auth-trust-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Secure Driver Portal
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
  authDomain:"fire-b-a8878.firebaseapp.com",
  projectId:"fire-b-a8878"
});
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt:'select_account' });

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// Redirect immediately if already in demo mode
if (localStorage.getItem('vynix_demo') === 'true') {
    window.location.href = 'index.html';
}

getRedirectResult(auth).catch(e => showToast('Login failed: ' + e.message));

onAuthStateChanged(auth, user => {
  if (user) {
    // Real user is logged in -> Go to main app
    window.location.href = 'index.html';
  } else {
    // Show login UI
    document.getElementById('initLoader').classList.add('hide');
    document.getElementById('authWrapper').style.opacity = '1';
  }
});

document.getElementById('btnGoogleSignIn').addEventListener('click', async () => {
  const btn = document.getElementById('btnGoogleSignIn');
  btn.style.opacity = '0.7'; btn.style.pointerEvents = 'none'; btn.innerHTML = 'Connecting…';
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked' || e.message.toLowerCase().includes('cross-origin')) {
      showToast('Using redirect login…'); signInWithRedirect(auth, provider);
    } else { 
      showToast('Login failed: ' + e.message); 
      btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; 
      btn.innerHTML = '<svg class="pill-g-icon" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/></svg> Continue with Google'; 
    }
  }
});

document.getElementById('skipAuth').addEventListener('click', () => {
  localStorage.setItem('vynix_demo', 'true');
  window.location.href = 'index.html';
});
</script>
</body>
</html>
