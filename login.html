<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VynixRide — Driver Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0F172A;
  --bg: #F1F5F9;
  --border: #E2E8F0;
  --blue: #1A3BFF;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:'Outfit',sans-serif; background:var(--bg); color:var(--ink); }

/* ── INIT LOADER ── */
.init-loader { position:fixed; inset:0; background:var(--bg); z-index:10001; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .4s; }
.init-loader.hide { opacity:0; pointer-events:none; }
.loader-spinner { width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:sp .8s linear infinite; margin-bottom:16px; }
@keyframes sp { to { transform:rotate(360deg); } }

/* ═══ AUTH UI ═══ */
.auth-wrapper { position:fixed; inset:0; z-index:998; display:flex; flex-direction:column; font-family:'Outfit',sans-serif; overflow:hidden; }
.auth-bg { position:absolute; inset:0; background:url('https://images.unsplash.com/photo-1549317661-bd32c8ce0be2?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center center/cover no-repeat; transform:scale(1.04); animation:auth-zoom 18s ease-in-out infinite alternate; filter: brightness(0.7); }
@keyframes auth-zoom { from{transform:scale(1.04)} to{transform:scale(1.12)} }
.auth-scrim { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,.18) 0%,rgba(0,0,0,.05) 30%,rgba(0,0,0,.45) 65%,rgba(0,0,0,.88) 100%); }
.auth-topbar { position:relative; z-index:2; display:flex; align-items:center; gap:12px; padding:56px 28px 0; }
.auth-logo-dot { width:44px; height:44px; background:#fff; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; color:var(--blue); flex-shrink:0; box-shadow:0 4px 18px rgba(0,0,0,.28); }
.auth-logo-name { font-size:22px; font-weight:800; color:#fff; letter-spacing:-.3px; text-shadow:0 2px 12px rgba(0,0,0,.35); }
.auth-spacer { flex:1; position:relative; z-index:2; }
.auth-bottom { position:relative; z-index:2; padding:32px 28px calc(44px + env(safe-area-inset-bottom,0px)); width: 100%; }
.auth-headline { font-size:clamp(32px,8vw,46px); font-weight:800; color:#fff; line-height:1.12; letter-spacing:-1px; margin-bottom:12px; text-shadow:0 2px 16px rgba(0,0,0,.3); }
.auth-subline { font-size:15px; color:rgba(255,255,255,.68); font-weight:400; margin-bottom:36px; line-height:1.55; max-width:320px; }
.auth-pills { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }
.pill-login { width:100%; padding:18px 28px; border-radius:100px; border:none; background:#fff; color:#0C0C14; font-family:'Outfit',sans-serif; font-size:16px; font-weight:800; cursor:pointer; letter-spacing:-.1px; box-shadow:0 6px 28px rgba(0,0,0,.32); transition:transform .15s,box-shadow .15s,background .15s; display:flex; align-items:center; justify-content:center; gap:10px; }
.pill-login:active { transform:scale(.97); }
.pill-g-icon { width:20px; height:20px; flex-shrink:0; }
.auth-demo-link { display:block; width:100%; text-align:center; background:none; border:none; padding:8px; font-family:'Outfit',sans-serif; font-size:13px; color:rgba(255,255,255,.42); font-weight:500; cursor:pointer; transition:color .2s; }
.auth-trust-bar { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:14px; font-size:11.5px; color:rgba(255,255,255,.28); }
.auth-feats { display:flex; gap:20px; margin-bottom:30px; }
.auth-feat-chip { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:rgba(255,255,255,.7); background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18); padding:5px 12px; border-radius:100px; backdrop-filter:blur(8px); }
.auth-feat-dot { width:5px; height:5px; border-radius:50%; background:#4A9AFF; flex-shrink:0; }

/* ── TOAST ── */
.toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(8px); background:var(--ink); color:#fff; padding:12px 24px; border-radius:30px; font-size:13px; font-weight:800; opacity:0; pointer-events:none; transition:.2s; z-index:1000; white-space:nowrap; max-width:90vw; overflow:hidden; text-overflow:ellipsis; box-shadow:0 6px 24px rgba(0,0,0,.2); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(min-width:900px){ .auth-bottom { max-width:460px; margin:0 auto; } }
</style>
</head>
<body>

<div class="init-loader" id="initLoader">
  <div class="loader-spinner"></div>
  <div style="font-family:'Outfit',sans-serif; font-weight:900; color:var(--blue); font-size:20px;">VynixRide Driver</div>
</div>

<div class="auth-wrapper" id="authWrapper" style="opacity:0; transition: opacity 0.3s;">
  <div class="auth-bg"></div>
  <div class="auth-scrim"></div>
  <div class="auth-topbar">
    <div class="auth-logo-dot">VX</div>
    <div class="auth-logo-name">VynixRide <span style="font-size:14px;font-weight:600;opacity:.8;margin-left:4px;">Driver</span></div>
  </div>
  <div class="auth-spacer"></div>
  <div class="auth-bottom">
    <div class="auth-feats">
      <div class="auth-feat-chip"><div class="auth-feat-dot"></div>Earn Daily</div>
      <div class="auth-feat-chip"><div class="auth-feat-dot"></div>Flexible Hours</div>
      <div class="auth-feat-chip"><div class="auth-feat-dot"></div>Fast Payouts</div>
    </div>
    <div class="auth-headline">Drive & earn,<br>on your terms.</div>
    <div class="auth-subline">Sign in to access your driver dashboard, manage requests, and track your earnings.</div>
    <div class="auth-pills">
      <button class="pill-login" id="btnGoogleSignIn">
        <svg class="pill-g-icon" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/>
          <path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.4 19.2 14 24 14c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 16.2 4 9.5 8.4 6.3 14.7z"/>
          <path fill="#FBBC05" d="M24 44c5.3 0 10.1-1.8 13.8-4.8l-6.4-5.4C29.5 35.5 26.9 36 24 36c-5.9 0-10.5-3.9-11.9-9.1l-7 5.4C8.4 39.6 15.6 44 24 44z"/>
          <path fill="#EA4335" d="M44.5 20H24v8.5h11.9c-.6 3-2.5 5.5-5.1 7.3l6.4 5.4C41.9 37.5 44.5 31.2 44.5 24c0-1.3-.2-2.7-.2-4z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
    <button class="auth-demo-link" id="skipAuth">Skip (Demo Mode) →</button>
    <div class="auth-trust-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Secure Driver Portal
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
  authDomain:"fire-b-a8878.firebaseapp.com",
  projectId:"fire-b-a8878"
});
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt:'select_account' });

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// Redirect immediately if already in demo mode
if (localStorage.getItem('vynix_demo') === 'true') {
    window.location.href = 'index.html';
}

getRedirectResult(auth).catch(e => showToast('Login failed: ' + e.message));

onAuthStateChanged(auth, user => {
  if (user) {
    // Real user is logged in -> Go to main app
    window.location.href = 'index.html';
  } else {
    // Show login UI
    document.getElementById('initLoader').classList.add('hide');
    document.getElementById('authWrapper').style.opacity = '1';
  }
});

document.getElementById('btnGoogleSignIn').addEventListener('click', async () => {
  const btn = document.getElementById('btnGoogleSignIn');
  btn.style.opacity = '0.7'; btn.style.pointerEvents = 'none'; btn.innerHTML = 'Connecting…';
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked' || e.message.toLowerCase().includes('cross-origin')) {
      showToast('Using redirect login…'); signInWithRedirect(auth, provider);
    } else { 
      showToast('Login failed: ' + e.message); 
      btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; 
      btn.innerHTML = '<svg class="pill-g-icon" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/></svg> Sign in with Google'; 
    }
  }
});

document.getElementById('skipAuth').addEventListener('click', () => {
  localStorage.setItem('vynix_demo', 'true');
  window.location.href = 'index.html';
});
</script>
</body>
</html>
